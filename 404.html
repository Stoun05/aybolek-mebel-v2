<!DOCTYPE html>
<html lang="tk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#173f3c">
  <title>Sahypa tapylmady | Aýbölek Mebel</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found{min-height:100svh;padding:120px 5%;display:grid;place-items:center;background:linear-gradient(135deg,#f3f8f7,#dfeeea);text-align:center}
    .not-found-card{width:min(680px,100%);padding:60px 32px;border-radius:32px;background:#fff;box-shadow:0 28px 80px rgba(18,58,55,.14)}
    .not-found-code{display:block;color:#2f9c95;font-size:clamp(72px,18vw,150px);font-weight:900;line-height:.9}
    .not-found h1{margin:24px 0 14px;color:#173f3c;font-size:clamp(31px,6vw,48px)}
    .not-found p{max-width:500px;margin:0 auto;color:#687875;font-size:17px;line-height:1.7}
    .not-found-actions{margin-top:32px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .not-found-actions a{min-height:48px;padding:14px 22px;border-radius:50px;background:#2f9c95;color:#fff;font-weight:900}
    .not-found-actions a:last-child{background:#173f3c}
  </style>
</head>
<body>
  <main class="not-found">
    <section class="not-found-card">
      <span class="not-found-code">404</span>
      <h1>Sahypa tapylmady</h1>
      <p>Gözleýän sahypaňyz göçürilen ýa-da salgysy nädogry ýazylan bolmagy mümkin.</p>
      <div class="not-found-actions">
        <a href="index.html">Baş sahypa</a>
        <a href="katalog.html">Katalogy aç</a>
      </div>
    </section>
  </main>
</body>
</html>
