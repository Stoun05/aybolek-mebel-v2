<!DOCTYPE html>
<html lang="tk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aýbölek Mebel katalogy: ýumşak, ofis, ýatylýan otag, naharhana mebellerini we mekdep harytlaryny gözläň hem filtrläň." />
  <meta name="theme-color" content="#173f3c" />
  <link rel="canonical" href="https://stoun05.github.io/aybolek-mebel-v2/katalog.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Aýbölek Mebel katalogy" />
  <meta property="og:description" content="20 mebel önümini kategoriýa we material boýunça gözläň." />
  <meta property="og:image" content="https://stoun05.github.io/aybolek-mebel-v2/images/hero/store-wide.webp" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Aýbölek Mebel | Katalog</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/catalog.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

  <div class="loader" id="loader">
    <div class="loader-content">
      <h2>AÝBÖLEK</h2>
      <p>Premium Furniture</p>
      <div class="loader-line">
        <span></span>
      </div>
    </div>
  </div>

  <header class="site-header">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Aýbölek Mebel">
    </a>

    <nav class="navbar" id="navbar">
      <a href="index.html">Baş sahypa</a>
      <a href="katalog.html" class="active">Katalog</a>
      <a href="about.html">Biz barada</a>
      <a href="contact.html">Habarlaşmak</a>
    </nav>

    <div class="header-actions">
      <button class="menu-btn" id="menuBtn">☰</button>
    </div>
  </header>

  <main>

    <section class="catalog-hero">
      <div>
        <span>KATALOG</span>
        <h1>Aýbölek mebel katalogy</h1>
        <p>Öý, ofis, naharhana we mekdep üçin 20 önüm ugruny kategoriýalar boýunça görüň.</p>
      </div>
    </section>

    <section class="catalog-page">

      <button class="filter-toggle" id="filterToggle" type="button" aria-expanded="false" aria-controls="filterPanel">☰ Filterleri aç</button>

      <aside class="filter-panel" id="filterPanel">
        <div class="filter-heading">
          <h3>Filtrler <span id="activeFilterCount" hidden>0</span></h3>
          <button id="clearFilters" type="button">Ählisini arassala</button>
        </div>

        <div class="filter-group">
          <h4>Kategoriýa</h4>

          <label>
            <input type="checkbox" value="soft">
            Ýumşak mebeller
          </label>

          <label>
            <input type="checkbox" value="office">
            Ofis mebelleri
          </label>

          <label>
            <input type="checkbox" value="bedroom">
            Ýatylýan otag mebelleri
          </label>

          <label>
            <input type="checkbox" value="dining">
            Naharhana mebelleri
          </label>

          <label>
            <input type="checkbox" value="school">
            Mekdep harytlary
          </label>
        </div>

        <div class="filter-group">
          <h4>Material</h4>

          <label>
            <input type="checkbox" value="fabric" data-filter="material">
            Mata we ýumşak örtük
          </label>

          <label>
            <input type="checkbox" value="wood" data-filter="material">
            Agaç we mebel paneli
          </label>

          <label>
            <input type="checkbox" value="metal" data-filter="material">
            Metal gurluş
          </label>

          <label>
            <input type="checkbox" value="glass" data-filter="material">
            Aýna görnüşi
          </label>
        </div>

      </aside>

      <div class="catalog-content">

        <div class="catalog-toolbar">
          <label class="catalog-search">
            <span class="sr-only">Önüm gözle</span>
            <input type="search" id="catalogSearch" placeholder="Önümiň adyny ýa-da görnüşini gözle..." autocomplete="off" />
          </label>
          <select id="catalogSort" aria-label="Önümleri tertiple">
            <option value="default">Adaty tertip</option>
            <option value="title-asc">Ady boýunça A–Z</option>
            <option value="title-desc">Ady boýunça Z–A</option>
            <option value="category">Kategoriýa boýunça</option>
          </select>
          <span id="catalogCount" aria-live="polite">0 önüm</span>
        </div>

        <div class="catalog-grid" id="catalogGrid" aria-live="polite"></div>
        <div class="no-products" id="catalogEmpty" hidden>
          <h3>Önüm tapylmady</h3>
          <p>Gözleg sözüni üýtgediň ýa-da filtrleri arassalaň.</p>
          <button id="emptyClearFilters" type="button">Filtrleri arassala</button>
        </div>

      </div>

    </section>

  </main>

  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>

</body>
</html>
