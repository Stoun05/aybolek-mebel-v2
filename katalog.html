<!DOCTYPE html>
<html lang="tk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Aýbölek Mebel | Katalog</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/catalog.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

  <div class="loader" id="loader">
    <div class="loader-content">
      <h2>AÝBÖLEK</h2>
      <p>Premium Furniture</p>
      <div class="loader-line">
        <span></span>
      </div>
    </div>
  </div>

  <header class="site-header">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Aýbölek Mebel">
    </a>

    <nav class="navbar" id="navbar">
      <a href="index.html">Baş sahypa</a>
      <a href="katalog.html" class="active">Katalog</a>
      <a href="about.html">Biz barada</a>
      <a href="contact.html">Habarlaşmak</a>
    </nav>

    <div class="header-actions">
      <button class="menu-btn" id="menuBtn">☰</button>
    </div>
  </header>

  <main>

    <section class="catalog-hero">
      <div>
        <span>KATALOG</span>
        <h1>Aýbölek mebel katalogy</h1>
        <p>Öý, ofis, naharhana we mekdep üçin 20 önüm ugruny kategoriýalar boýunça görüň.</p>
      </div>
    </section>

    <section class="catalog-page">

      <button class="filter-toggle" id="filterToggle" type="button" aria-expanded="false">☰ Filterleri aç</button>

      <aside class="filter-panel" id="filterPanel">
        <div class="filter-heading">
          <h3>Filter</h3>
          <button id="clearFilters" type="button">Arassala</button>
        </div>

        <div class="filter-group">
          <h4>Kategoriýa</h4>

          <label>
            <input type="checkbox" value="soft">
            Ýumşak mebeller
          </label>

          <label>
            <input type="checkbox" value="office">
            Ofis mebelleri
          </label>

          <label>
            <input type="checkbox" value="bedroom">
            Ýatylýan otag mebelleri
          </label>

          <label>
            <input type="checkbox" value="dining">
            Naharhana mebelleri
          </label>

          <label>
            <input type="checkbox" value="school">
            Mekdep harytlary
          </label>
        </div>

      </aside>

      <div class="catalog-content">

        <div class="catalog-toolbar">
          <input type="text" id="catalogSearch" placeholder="Mebel gözle..." />
          <span id="catalogCount" aria-live="polite">0 önüm</span>
        </div>

        <div class="catalog-grid" id="catalogGrid" aria-live="polite"></div>
        <p id="catalogEmpty" hidden style="padding:40px 0;text-align:center">
          Bu kategoriýada entek önüm ýerleşdirilmedi.
        </p>

      </div>

    </section>

  </main>

  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>

</body>
</html>
